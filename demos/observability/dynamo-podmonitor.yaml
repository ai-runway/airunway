# PodMonitor for NVIDIA Dynamo inference pods
#
# Dynamo deploys three component types, each with its own metrics port:
#   - Frontend (router):       port http/8000  — dynamo_frontend_*, dynamo_router_*
#   - VllmDecodeWorker:        port system/9090 — dynamo_component_*, vllm:*
#   - VllmPrefillWorker:       port system/9090 — dynamo_component_*, vllm:*
#
# All Dynamo inference pods carry the label nvidia.com/metrics-enabled=true.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: dynamo-inference-metrics
  namespace: dynamo-system
  labels:
    release: prometheus
    app.kubernetes.io/part-of: airunway
spec:
  selector:
    matchLabels:
      nvidia.com/metrics-enabled: "true"
    matchExpressions:
      - key: nvidia.com/dynamo-component-type
        operator: In
        values: ["frontend", "worker"]
  podMetricsEndpoints:
    # Frontend / router pods (port 8000)
    - portNumber: 8000
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      relabelings:
        - action: replace
          sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - action: replace
          sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - action: replace
          sourceLabels:
            [__meta_kubernetes_pod_label_nvidia_com_dynamo_component]
          targetLabel: dynamo_component
        - action: replace
          sourceLabels:
            [
              __meta_kubernetes_pod_label_nvidia_com_dynamo_graph_deployment_name,
            ]
          targetLabel: model_deployment
        - action: replace
          targetLabel: provider
          replacement: dynamo
    # Worker pods - decode and prefill (port 9090)
    - portNumber: 9090
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      relabelings:
        - action: replace
          sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - action: replace
          sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - action: replace
          sourceLabels:
            [__meta_kubernetes_pod_label_nvidia_com_dynamo_component]
          targetLabel: dynamo_component
        - action: replace
          sourceLabels:
            [__meta_kubernetes_pod_label_nvidia_com_dynamo_sub_component_type]
          targetLabel: dynamo_role
        - action: replace
          sourceLabels:
            [
              __meta_kubernetes_pod_label_nvidia_com_dynamo_graph_deployment_name,
            ]
          targetLabel: model_deployment
        - action: replace
          targetLabel: provider
          replacement: dynamo
  namespaceSelector:
    any: true
