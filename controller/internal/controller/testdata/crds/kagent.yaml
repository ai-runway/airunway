# Minimal kagent CRD stubs for envtest. These are NOT the upstream kagent
# schemas — they exist only so the kagent provider's rendered Agent /
# ModelConfig custom resources can be applied and read back in tests without
# installing the real kagent operator. The spec is preserve-unknown-fields so
# any rendered shape is accepted; assertions inspect the stored fields.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agents.kagent.dev
spec:
  group: kagent.dev
  names:
    kind: Agent
    listKind: AgentList
    plural: agents
    singular: agent
  scope: Namespaced
  versions:
    - name: v1alpha2
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: modelconfigs.kagent.dev
spec:
  group: kagent.dev
  names:
    kind: ModelConfig
    listKind: ModelConfigList
    plural: modelconfigs
    singular: modelconfig
  scope: Namespaced
  versions:
    - name: v1alpha2
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
