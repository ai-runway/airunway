# Container-based agent framework: OpenClaw via the generic container provider.
# Demonstrates a non-Kubernetes-native framework whose image is supplied by
# the catalog entry and rendered into Deployment+Service by the container
# provider.
apiVersion: airunway.ai/v1alpha1
kind: AgentProviderConfig
metadata:
  name: openclaw
  annotations:
    airunway.ai/agent-catalog: |
      [
        {
          "name": "openclaw-personal-assistant",
          "title": "Personal AI assistant (OpenClaw)",
          "description": "OpenClaw running as a personal automation agent. Bind to any OpenAI-compatible model managed by AI Runway.",
          "image": "ghcr.io/openclaw/openclaw:latest",
          "tags": ["personal", "automation"]
        }
      ]
  labels:
    app.kubernetes.io/name: airunway
    app.kubernetes.io/managed-by: kustomize
spec:
  capabilities:
    backend: container
    requiresOperator: false
    modelBindingModes:
      - deploymentRef
      - externalAPI
    protocols:
      - openaiTools
---
# CRD-native agent framework: Kagent.
# Demonstrates a framework whose provider renders the AgentDeployment
# into a framework-native custom resource (kagent.dev/Agent + ModelConfig).
apiVersion: airunway.ai/v1alpha1
kind: AgentProviderConfig
metadata:
  name: kagent
  annotations:
    airunway.ai/install-instructions: "Install the Kagent operator in the cluster before deploying agents with this framework."
    airunway.ai/agent-catalog: |
      [
        {
          "name": "kagent-k8s-sre",
          "title": "Kubernetes SRE (Kagent)",
          "description": "Diagnose deployments, pods, and networking. Backed by Kagent's native Agent CR.",
          "tags": ["devops", "observability"]
        }
      ]
  labels:
    app.kubernetes.io/name: airunway
    app.kubernetes.io/managed-by: kustomize
spec:
  capabilities:
    backend: crd
    requiresOperator: true
    modelBindingModes:
      - deploymentRef
      - gatewayEndpoint
      - externalAPI
    protocols:
      - mcp
      - a2a
      - openaiTools
---
# CRD-native agent framework: Orka (Kubernetes-native agent swarms).
# Like Kagent this is a crd-backend framework, but its coordinator/specialist
# agents run as Kubernetes Jobs (a task/one-shot shape) rather than
# long-running servers — the concrete driver for the spec.lifecycle open
# question in the design.
apiVersion: airunway.ai/v1alpha1
kind: AgentProviderConfig
metadata:
  name: orka
  annotations:
    airunway.ai/install-instructions: "Install the Orka operator in the cluster before deploying agents with this framework."
    airunway.ai/agent-catalog: |
      [
        {
          "name": "orka-task-swarm",
          "title": "Task swarm (Orka)",
          "description": "A coordinator agent decomposes a task and spawns specialist agents in parallel as Kubernetes Jobs, then synthesises the results.",
          "tags": ["automation", "swarm"]
        }
      ]
  labels:
    app.kubernetes.io/name: airunway
    app.kubernetes.io/managed-by: kustomize
spec:
  capabilities:
    backend: crd
    requiresOperator: true
    modelBindingModes:
      - deploymentRef
      - externalAPI
    protocols:
      - mcp
      - openaiTools
---
# Container-based agent framework: Hermes. Served by the SAME generic
# container provider as OpenClaw/CrewAI/LangGraph — added purely as catalog
# data (image + recipe), with no new provider code. This is the
# "extensible by data, not code" property in practice.
apiVersion: airunway.ai/v1alpha1
kind: AgentProviderConfig
metadata:
  name: hermes
  annotations:
    airunway.ai/agent-catalog: |
      [
        {
          "name": "hermes-assistant",
          "title": "Hermes assistant",
          "description": "Hermes running as a fast container-based task assistant, bound to any OpenAI-compatible model managed by AI Runway.",
          "image": "ghcr.io/hermes/hermes-agent:latest",
          "tags": ["automation"]
        }
      ]
  labels:
    app.kubernetes.io/name: airunway
    app.kubernetes.io/managed-by: kustomize
spec:
  capabilities:
    backend: container
    requiresOperator: false
    modelBindingModes:
      - externalAPI
      - deploymentRef
    protocols:
      - openaiTools
