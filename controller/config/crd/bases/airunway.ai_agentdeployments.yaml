---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: agentdeployments.airunway.ai
spec:
  group: airunway.ai
  names:
    kind: AgentDeployment
    listKind: AgentDeploymentList
    plural: agentdeployments
    singular: agentdeployment
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.framework.name
      name: Framework
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AgentDeployment is the Schema for the agentdeployments API.

          An AgentDeployment describes one agent instance: which framework
          reconciles it, which model it talks to, and the framework-specific
          configuration that defines its behaviour.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AgentDeploymentSpec defines the desired state of an AgentDeployment.
            properties:
              config:
                description: |-
                  config carries framework-specific configuration (e.g. system
                  prompt, skills, crew definition, graph definition).

                  The shape is defined by the framework provider. Use RawExtension
                  here so the core controller does not need to learn every
                  framework's schema; each provider controller parses this field
                  itself. Providers currently perform best-effort parsing and ignore
                  unknown keys — there is no enforced JSON-schema validation contract
                  yet, so malformed config is treated as empty rather than rejected.
                type: object
                x-kubernetes-preserve-unknown-fields: true
              framework:
                description: |-
                  framework selects which agent framework provider reconciles this
                  AgentDeployment. The provider must have a matching
                  AgentProviderConfig registered in the cluster.
                properties:
                  name:
                    description: |-
                      name is the framework identifier, e.g. "kagent", "openclaw",
                      "crewai", "langgraph". Must match an AgentProviderConfig.metadata.name.
                    maxLength: 63
                    minLength: 1
                    pattern: ^[a-z0-9]([a-z0-9-]*[a-z0-9])?$
                    type: string
                required:
                - name
                type: object
              lifecycle:
                default: deployment
                description: |-
                  lifecycle selects long-running (deployment) vs one-shot (job) execution
                  for container-backed agents. Ignored by crd-backend frameworks, whose
                  operator owns the execution shape. Defaults to deployment.
                enum:
                - deployment
                - job
                type: string
              model:
                description: model describes the model endpoint the agent talks to.
                properties:
                  deploymentRef:
                    description: deploymentRef binds to an in-cluster ModelDeployment.
                    properties:
                      name:
                        description: name is the ModelDeployment name to bind to.
                        minLength: 1
                        type: string
                      namespace:
                        description: |-
                          namespace defaults to the AgentDeployment's namespace when empty.
                          Cross-namespace references require an AgentReferenceGrant (Phase 3).
                        type: string
                    required:
                    - name
                    type: object
                  externalAPI:
                    description: externalAPI binds to an external OpenAI-compatible
                      endpoint.
                    properties:
                      baseURL:
                        description: baseURL is the OpenAI-compatible base URL, e.g.
                          "https://api.openai.com/v1".
                        minLength: 1
                        type: string
                      credentialsRef:
                        description: credentialsRef points at a Secret holding the
                          API credentials.
                        properties:
                          key:
                            description: key inside the Secret to read.
                            minLength: 1
                            type: string
                          name:
                            description: name of the Secret in the AgentDeployment's
                              namespace.
                            minLength: 1
                            type: string
                        required:
                        - key
                        - name
                        type: object
                      modelName:
                        description: modelName is the model identifier the agent will
                          request.
                        minLength: 1
                        type: string
                      type:
                        description: |-
                          type identifies the well-known API shape. Use "custom" for any
                          OpenAI-compatible endpoint not covered by the named types.
                        enum:
                        - openai
                        - anthropic
                        - azureOpenAI
                        - custom
                        type: string
                    required:
                    - baseURL
                    - modelName
                    - type
                    type: object
                  gatewayEndpoint:
                    description: gatewayEndpoint binds to a model exposed through
                      Gateway API (GAIE).
                    properties:
                      gatewayRef:
                        description: gatewayRef points at the Gateway resource that
                          serves the model.
                        properties:
                          name:
                            description: name of the Gateway resource.
                            minLength: 1
                            type: string
                          namespace:
                            description: namespace of the Gateway resource.
                            type: string
                        required:
                        - name
                        type: object
                      modelName:
                        description: modelName is the served model name advertised
                          through the gateway.
                        minLength: 1
                        type: string
                    required:
                    - gatewayRef
                    - modelName
                    type: object
                type: object
                x-kubernetes-validations:
                - message: exactly one of deploymentRef, gatewayEndpoint, or externalAPI
                    must be set
                  rule: ((has(self.deploymentRef)?1:0)+(has(self.gatewayEndpoint)?1:0)+(has(self.externalAPI)?1:0))
                    == 1
              observability:
                description: observability configures observability emission (OTLP
                  export).
                properties:
                  otlp:
                    description: |-
                      otlp configures OpenTelemetry export. The container backend injects the
                      matching OTEL_EXPORTER_OTLP_* environment variables into the rendered
                      agent workload. CRD-backed providers (e.g. kagent, orka) do NOT currently
                      propagate it to their upstream operators, so on those backends this field
                      is accepted but has no effect until native mapping is added.
                    properties:
                      endpoint:
                        description: endpoint is the OTLP collector endpoint URL.
                        minLength: 1
                        type: string
                      protocol:
                        description: protocol identifies the OTLP transport (http/protobuf,
                          grpc, ...).
                        type: string
                    required:
                    - endpoint
                    type: object
                type: object
              provider:
                description: provider carries provider-specific escape-hatch settings.
                properties:
                  overrides:
                    description: |-
                      overrides contains provider-specific configuration overrides.
                      This is an escape hatch for framework/provider-specific features.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                type: object
              resources:
                description: |-
                  resources sets resource requests/limits for the rendered agent
                  workload. The container backend maps this onto the agent container's
                  resource requirements. CRD-backed providers (e.g. kagent, orka) do NOT
                  currently translate it — their upstream operators own scheduling — so on
                  those backends this field is accepted but has no effect. Treat it as a
                  container-backend hint until per-backend mapping is added.
                properties:
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: limits sets the maximum CPU and memory the agent
                      may use.
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: requests sets the minimum CPU and memory required
                      for the agent.
                    type: object
                type: object
            required:
            - framework
            - model
            type: object
          status:
            description: |-
              AgentDeploymentStatus defines the observed state of an AgentDeployment.

              Status ownership is split between the core controller and the
              framework provider controller; the field-owner is shown in parens.

                - framework, modelBinding                                     (core)
                - conditions[ModelBound], conditions[FrameworkReady]          (core)
                - conditions[Ready]                                           (core)
                - phase, runtime, replicas, conditions[ProviderReady]         (provider)

              Both writers MUST use server-side apply with distinct field owners
              so the API server itself prevents cross-writes.
            properties:
              conditions:
                description: conditions follow the standard Kubernetes condition pattern.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              framework:
                description: framework is the resolved framework metadata. Owned by
                  core.
                properties:
                  name:
                    description: name is the resolved framework name (mirrors spec.framework.name).
                    type: string
                  providerVersion:
                    description: |-
                      providerVersion is the version reported by the AgentProviderConfig
                      status at resolution time. Useful for debugging skew between the
                      AgentDeployment and the framework provider.
                    type: string
                type: object
              modelBinding:
                description: |-
                  modelBinding is the resolved binding contract for the framework
                  provider to consume. Owned by core.
                properties:
                  apiType:
                    description: |-
                      apiType echoes the ExternalAPIBinding.Type for externalAPI
                      bindings (openai, anthropic, azureOpenAI, custom), so providers can
                      render the correct provider shape instead of assuming OpenAI. Empty
                      for deploymentRef and gatewayEndpoint bindings, which are always
                      OpenAI-compatible in-cluster endpoints.
                    enum:
                    - openai
                    - anthropic
                    - azureOpenAI
                    - custom
                    type: string
                  baseURL:
                    description: |-
                      baseURL is the resolved OpenAI-compatible base URL for the model
                      endpoint (e.g. http://my-model.inference.svc.cluster.local/v1).
                    type: string
                  bindingMode:
                    description: bindingMode echoes which binding mode in spec.model
                      was used.
                    enum:
                    - deploymentRef
                    - gatewayEndpoint
                    - externalAPI
                    type: string
                  credentialsRef:
                    description: |-
                      credentialsRef points at a Secret with credentials the agent
                      should mount. Empty when no credentials are required.
                    properties:
                      key:
                        description: key inside the Secret to read.
                        minLength: 1
                        type: string
                      name:
                        description: name of the Secret in the AgentDeployment's namespace.
                        minLength: 1
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  modelName:
                    description: modelName is the model identifier the agent should
                      request.
                    type: string
                  observedResourceUID:
                    description: |-
                      observedResourceUID is the UID of the underlying resource (e.g.
                      the ModelDeployment for deploymentRef bindings). The core
                      controller uses this to detect delete+recreate so providers
                      re-render agents when the upstream resource changes identity.
                    type: string
                type: object
              observedGeneration:
                description: |-
                  observedGeneration is the AgentDeployment.metadata.generation
                  observed by the core controller.
                format: int64
                type: integer
              phase:
                description: phase is the high-level lifecycle phase. Owned by the
                  framework provider.
                enum:
                - Pending
                - Deploying
                - Running
                - Completed
                - Failed
                - Terminating
                type: string
              replicas:
                description: |-
                  replicas summarises desired/ready instance counts. Owned by the
                  framework provider.
                properties:
                  available:
                    description: |-
                      available is the count of instances that have been ready for at
                      least minReadySeconds (per the underlying workload's definition
                      of available, e.g. apps/v1.Deployment.status.availableReplicas).
                    format: int32
                    type: integer
                  desired:
                    description: desired is the desired number of agent instances.
                    format: int32
                    type: integer
                  ready:
                    description: ready is the count of instances reporting ready.
                    format: int32
                    type: integer
                type: object
              runtime:
                description: runtime describes the rendered workload. Owned by the
                  framework provider.
                properties:
                  address:
                    description: |-
                      address is the in-cluster service URL the agent is reachable at,
                      when applicable.
                    type: string
                  workloadRef:
                    description: |-
                      workloadRef points at the framework-native resource the provider
                      created (e.g. Kagent Agent CR, plain Deployment).
                    properties:
                      apiVersion:
                        description: apiVersion of the backing resource (e.g. "kagent.dev/v1alpha1",
                          "apps/v1").
                        type: string
                      kind:
                        description: kind of the backing resource (e.g. "Agent", "Deployment").
                        type: string
                      name:
                        description: name of the backing resource.
                        type: string
                      namespace:
                        description: namespace of the backing resource. Empty for
                          cluster-scoped resources.
                        type: string
                    required:
                    - apiVersion
                    - kind
                    - name
                    type: object
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
